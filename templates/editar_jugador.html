{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card banner-card shadow">
            <div class="card-body">
                <h3 class="header-section mb-4">📝 Editar Activo</h3>
                <p class="text-muted small">Modificando los datos de: <strong>{{ jugador.nombre }}</strong></p>

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-corrupta">Actualizar Datos</button>
                        <a href="{% url 'jugadores' %}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
