{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-top-gold">
                <div class="card-body">
                    <h3 class="fw-bold mb-4">🏃 Registrar Nuevo Activo</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">{{ field.label }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success">Confirmar Fichaje</button>
                            <a href="{% url 'jugadores' %}" class="btn btn-outline-secondary">Volver a la lista</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
