{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card banner-card sidebar-sticky">
            <div class="card-body">
                <h3 class="header-section">📥 Carga de Jugadores</h3>
                <p class="text-muted small">Importa la plantilla completa desde un archivo CSV.</p>

                <div class="alert alert-info border-0 small py-2">
                    <strong>Orden esperado del CSV:</strong><br>
                    Nombre, Equipo, Posición, Edad, Media
                </div>

                <form method="post" enctype="multipart/form-data" class="mt-4">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Archivo CSV</label>
                        <input type="file" name="archivo_csv" class="form-control shadow-sm" accept=".csv" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-corrupta">Iniciar Carga Masiva</button>
                        <a href="{% url 'jugadores' %}" class="btn btn-link btn-sm text-muted">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
