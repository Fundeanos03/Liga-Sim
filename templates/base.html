{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Corrupta</title>
    <link rel="icon" href="{% static 'img/logo_Elegante_balon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="{% url 'index' %}">
                <img src="{% static 'img/logo_Elegante_balon.png' %}" alt="Logo" style="width: 40px; height: auto;" class="me-2">
                <span>LIGA <span style="color: var(--accent-gold);">CORRUPTA</span></span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMain">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link px-3" href={%  url 'clasi' %}>Clasificación</a>
                    <a class="nav-link px-3" href="#">Mercado</a>
                    <a class="nav-link px-3" href="#">Reglamento</a>
                    <a class="nav-link px-3 fw-bold" href="{% url 'administracion' %}" style="color: var(--dark-pitch);">Administración</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top">
        <p class="text-muted small">© 2026 Liga Corrupta - "Donde ganar es lo de menos, si pagas bien"</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
